include:
  - _templates.yml

App\Identity\Domain\Organization\Organization:
  organization1:
    __factory:
        register:
            name: 'Log Monitoring Owner Org'
  organization2:
    __factory:
        register:
            name: 'Log Monitoring Other Org'

App\Identity\Domain\User\User:
  user1:
    __factory:
      register:
        organizationId: '@organization1->uuid'
        email: <(App\Tests\Mock\ValueObjectFactory::monitoringEmail('owner'))>
        password: <(password_hash('demo1234', PASSWORD_DEFAULT))>
    __calls:
      - activate: [ ]
  user2:
    __factory:
      register:
        organizationId: '@organization2->uuid'
        email: <(App\Tests\Mock\ValueObjectFactory::monitoringEmail('other'))>
        password: <(password_hash('demo1234', PASSWORD_DEFAULT))>
    __calls:
      - activate: [ ]

App\Projects\Domain\Project:
  project1 (extends project):
    __factory:
      register:
        uuid: <uuid('135a465d-cf7a-4ca8-872a-c76272cbb16f')>
        organizationId: '@organization1->uuid'
        name: 'Owner Monitored Project'
  project2 (extends project):
    __factory:
      register:
        organizationId: '@organization1->uuid'
        name: 'Another Owner Project'

App\Projects\Domain\IngestionKey:
  ingestionKeyActive:
    __factory:
      new:
        projectId: '@project1->uuid'
        name: 'Active Ingestion Key'
        keyHash: '5ba4d1100b4ddbcfe3b7ad37af948c76b043e710c571bd81432a551151f2c99c'
        keyValue: 'mon_ing_demo0000000000000000000000000000'
  ingestionKeyActiveRevoked:
    __factory:
      new:
        projectId: '@project1->uuid'
        name: 'Revoked Ingestion Key'
        keyHash: '47782fcca6f185c64f7ebb80db7776480d96355c9cb63d640e94c4317011aa55'
    __calls:
      - revoke: []
