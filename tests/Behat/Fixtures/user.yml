include:
  - _templates.yml

App\Identity\Domain\Organization\Organization:
  organization1:
    __factory:
      register:
        name: 'organization1'

App\Identity\Domain\User\User:
  user1:
    __factory:
      register:
        - '@organization1->uuid'
        - <(App\Tests\Mock\ValueObjectFactory::monitoringEmail('owner'))>
        - <(password_hash('demo1234', PASSWORD_DEFAULT))>
    __calls:
      - activate: [ ]
