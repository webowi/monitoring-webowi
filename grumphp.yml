grumphp:
  stop_on_failure: true
  tasks:
    composer:
      file: composer.json
    phpcsfixer:
      config: './.php-cs-fixer.php'
      using_cache: ~
      config_contains_finder: true
      verbose: true
      diff: false
      triggered_by: [ 'php' ]
    phplint:
      exclude: [ ]
      jobs: ~
      short_open_tag: false
      ignore_patterns: [ ]
      triggered_by: [ 'php', 'phtml', 'php3', 'php4', 'php5', 'php6', 'php7', 'php8' ]
    #        TODO not support for php 8.4
    #        phpmd:
    #            whitelist_patterns:
    #                - /^src\/(.*)/
    #                - /^migrations\/(.*)/
    #            exclude: [ 'public/index.php' ]
    #            ruleset: [ 'phpmd_ruleset.xml' ]
    #            triggered_by: [ 'php' ]
    phpstan:
      level: max
      configuration: './phpstan.neon'
      memory_limit: "-1"
      use_grumphp_paths: false
    #            TODO not support for php 8.4
    #        phpmd-for-tests:
    #            whitelist_patterns:
    #                - /^tests\/(.*)/
    #            exclude: [ ]
    #            ruleset: [ 'phpmd_tests_ruleset.xml' ]
    #            triggered_by: [ 'php' ]
    #            metadata:
    #                task: phpmd
    phpunit:
      always_execute: true
