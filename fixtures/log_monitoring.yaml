App\Identity\Domain\Organization\Organization:
  log_monitoring_org:
    name: 'Log Monitoring Demo Org'

App\Identity\Domain\ValueObject\Email:
  log_monitoring_email:
    __construct: ['demo@monitoring-webowi.test']

App\Identity\Domain\User\User:
  log_monitoring_user:
    __factory:
      register: ['@log_monitoring_org->uuid', '@log_monitoring_email', '\$2y\$13\$cpHEXyzBYay7KgXm0SNvTeNqMch55awUTgdF320euVqn0EkzzVhqu']
    __calls:
      - activate: []

App\Projects\Domain\Project:
  log_monitoring_project:
    uuid: <(\Symfony\Component\Uid\Uuid::v4())>
    organizationId: '@log_monitoring_org->uuid'
    name: 'Demo Monitored Project'

App\Projects\Domain\IngestionKey:
  log_monitoring_key:
    uuid: <(\Symfony\Component\Uid\Uuid::v4())>
    projectId: '@log_monitoring_project->uuid'
    name: 'Demo Ingestion Key'
    keyHash: '5ba4d1100b4ddbcfe3b7ad37af948c76b043e710c571bd81432a551151f2c99c'
