security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            id: App\Identity\Infrastructure\Security\UserProvider
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api_auth:
            pattern: ^/api/v1/auth/(sign-in|sign-up|token/refresh)
            lazy: true
            stateless: true
            security: false
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
            logout:
                path: app_logout
                target: /
        ingestion:
            pattern: ^/api/v1/logs/ingest
            stateless: true
            custom_authenticators:
                - App\Projects\Infrastructure\Security\IngestionKeyAuthenticator
        api:
            pattern: ^/api/v1
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/v1/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/logs/ingest, roles: ROLE_INGESTION }
        - { path: ^/api,         roles: IS_AUTHENTICATED_FULLY }
