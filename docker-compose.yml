version: '3.4'

networks:
  monitoring-webowi-network:
    driver: bridge

services:
  monitoring-webowi-nginx:
    container_name: monitoring-webowi-nginx
    image: nginx:stable-alpine
    ports:
      - "${DOCKER_NGINX_PORT:-34500}:80"
    networks:
      - monitoring-webowi-network
    volumes:
      - ./:/var/www/html
      - ./docker/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - monitoring-webowi-php
      - monitoring-webowi-mysql

  monitoring-webowi-php:
    build:
      context: .
      dockerfile: ./docker/etc/php/main.Dockerfile
    container_name: monitoring-webowi-php
    networks:
      - monitoring-webowi-network
    depends_on:
      - monitoring-webowi-mysql
    volumes:
      - ./:/var/www/html

  monitoring-webowi-mysql:
    container_name: monitoring-webowi-mysql
    image: mysql:8.0
    networks:
      - monitoring-webowi-network
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DOCKER_MYSQL_DB}
      MYSQL_USER: ${DOCKER_MYSQL_USER}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

  monitoring-webowi-mysql-test:
    container_name: monitoring-webowi-mysql-test
    image: mysql:8.0
    networks:
      - monitoring-webowi-network
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DOCKER_MYSQL_DB_TEST}
      MYSQL_USER: ${DOCKER_MYSQL_USER}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD}

volumes:
    mysql-data:
